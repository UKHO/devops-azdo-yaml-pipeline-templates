# Azure DevOps Task: Terraform CLI
#
# Purpose:
#   Executes Terraform commands in an Azure DevOps pipeline, supporting init, validate, plan, apply, output, and custom commands.
#   Flexible parameter handling via CommandOptions allows for advanced Terraform configurations.
#
# Parameters:
#   - TaskEnvironmentVariables (object, optional): Environment variables to be passed to the task. Default: {}
#   - TaskNameUniqueSlug (string, optional): Unique string to add to the task name to make it unique if the same command is repeated. Default: ''
#   - WorkingDirectory (string, optional): Directory containing Terraform configuration files. Default: $(Pipeline.Workspace)
#   - Condition (string, optional): Evaluate this condition expression to determine whether to run this task. Default: succeeded()
#   - RetryCountOnTaskFailure (number, optional): Number of times to retry the task on failure. Default: 0
#   - Command (string, required): The Terraform command to execute. Supported: init, validate, plan, apply, output, custom.
#   - CommandOptions (string, optional): Extra arguments for the Terraform command. Default: ''
#   - CustomCommand (string, optional): Custom Terraform CLI command (when Command is custom). Default: ''
#   - SaveOutputsToFile (boolean, optional): Save terraform output to terraform-output.json file (output command only). Default: false
#
# Example Usage:
#   - template: tasks/terraform.yml
#     parameters:
#       Command: 'init'
#       CommandOptions: '-backend-config="key=terraform.tfstate"'
#
#   - template: tasks/terraform.yml
#     parameters:
#       Command: 'plan'
#       CommandOptions: '-out=tfplan -input=false'
#
#   - template: tasks/terraform.yml
#     parameters:
#       Command: 'apply'
#       CommandOptions: 'tfplan'
#
#   - template: tasks/terraform.yml
#     parameters:
#       Command: 'output'
#       SaveOutputsToFile: true
#
#   - template: tasks/terraform.yml
#     parameters:
#       Command: 'custom'
#       CustomCommand: 'version'
#
# Notes:
#   - Backend and provider configuration should be managed via CommandOptions or Terraform configuration files.
#   - Uses native shell execution (script task) for Terraform CLI commands.
#   - Ensure Terraform CLI is installed and in PATH before executing this template.
#   - See: https://www.terraform.io/cli

parameters:
  # Standard Azure DevOps Task Parameters
  - name: TaskEnvironmentVariables
    type: object
    default: { }
    displayName: 'Key/value pairs of environment variables to be passed to the task'

  - name: TaskNameUniqueSlug
    type: string
    default: ''
    displayName: 'Unique string to add to the task name to make it unique if the same command is repeated'

  - name: Condition
    type: string
    default: succeeded()
    displayName: 'Evaluate this condition expression to determine whether to run this task'

  - name: WorkingDirectory
    type: string
    default: '$(Pipeline.Workspace)'
    displayName: 'Directory containing Terraform configuration files'

  - name: RetryCountOnTaskFailure
    type: number
    default: 0
    displayName: 'Number of times to retry the task on failure'

  - name: Command
    type: string
    # NO default - Consumer must provide this
    values:
      - init
      - validate
      - plan
      - apply
      - output
      - custom
    displayName: 'Terraform command (required)'

  - name: CommandOptions
    type: string
    default: ''
    displayName: 'Extra arguments for the Terraform command'

  - name: CustomCommand
    type: string
    default: ''
    displayName: 'Custom Terraform CLI command (when Command is custom)'

  - name: SaveOutputsToFile
    type: boolean
    default: false
    displayName: 'Save terraform output to terraform-output.json file (output command only)'

  - name: ServiceConnection
    type: string
    default: ''
    displayName: 'Service connection for backend state storage'

steps:
  - ${{ if eq(parameters.ServiceConnection, '') }}:
      - script: terraform ${{ iif(ne(parameters.Command, 'custom'), parameters.Command, parameters.CustomCommand) }} ${{ parameters.CommandOptions }} ${{ iif(and(eq(parameters.Command, 'output'), parameters.SaveOutputsToFile), '> terraform-output.json', '') }} # '> terraform-output.json' has to be last
        displayName: 'Terraform ${{ parameters.Command }}'
        name: TerraformTask_${{ parameters.Command }}${{ iif(parameters.TaskNameUniqueSlug, format('_{0}', parameters.TaskNameUniqueSlug), '') }}
        ${{ if ne(parameters.WorkingDirectory, '') }}:
          workingDirectory: ${{ parameters.WorkingDirectory }}
        ${{ if gt(length(parameters.TaskEnvironmentVariables), 0) }}:
          env: ${{ parameters.TaskEnvironmentVariables }}
        ${{ if ne(parameters.Condition, '') }}:
          condition: ${{ parameters.Condition }}
        ${{ if gt(parameters.RetryCountOnTaskFailure, 0) }}:
          retryCountOnTaskFailure: ${{ parameters.RetryCountOnTaskFailure }}
  - ${{ else }}:
      - task: AzureCLI@2
        inputs:
          azureSubscription: ${{ parameters.ServiceConnection }}
          scriptType: pscore
          scriptLocation: inlineScript
          inlineScript: terraform ${{ iif(ne(parameters.Command, 'custom'), parameters.Command, parameters.CustomCommand) }} ${{ parameters.CommandOptions }} ${{ iif(and(eq(parameters.Command, 'output'), parameters.SaveOutputsToFile), '> terraform-output.json', '') }} # '> terraform-output.json' has to be last
          ${{ if ne(parameters.WorkingDirectory, '') }}:
            workingDirectory: ${{ parameters.WorkingDirectory }}
        displayName: 'Terraform ${{ parameters.Command }}'
        name: TerraformTask_${{ parameters.Command }}${{ iif(parameters.TaskNameUniqueSlug, format('_{0}', parameters.TaskNameUniqueSlug), '') }}
        ${{ if gt(length(parameters.TaskEnvironmentVariables), 0) }}:
          env: ${{ parameters.TaskEnvironmentVariables }}
        ${{ if ne(parameters.Condition, '') }}:
          condition: ${{ parameters.Condition }}
        ${{ if gt(parameters.RetryCountOnTaskFailure, 0) }}:
          retryCountOnTaskFailure: ${{ parameters.RetryCountOnTaskFailure }}
