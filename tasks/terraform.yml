# Azure DevOps Task: Terraform CLI
#
# Purpose:
#   Executes Terraform commands in an Azure DevOps pipeline, supporting init, validate, plan, apply, output, and custom commands.
#   Flexible parameter handling via CommandOptions allows for advanced Terraform configurations.
#
# Parameters:
#   - TaskEnvironmentVariables (object, optional): Environment variables to be passed to the task. Default: {}
#   - TaskNameUniqueSlug (string, optional): Unique string to add to the task name to make it unique if the same command is repeated. Default: ''
#   - WorkingDirectory (string, optional): Directory containing Terraform configuration files. Default: $(Pipeline.Workspace)
#   - Condition (string, optional): Evaluate this condition expression to determine whether to run this task. Default: succeeded()
#   - RetryCountOnTaskFailure (number, optional): Number of times to retry the task on failure. Default: 0
#   - Command (string, required): The Terraform command to execute. Values: init, validate, plan, apply, output, custom.
#   - CommandOptions (string, optional): Extra arguments for the Terraform command. Default: ''
#   - CustomCommand (string, optional): Custom Terraform CLI command (when Command is custom). Default: ''
#   - SaveOutputsToFile (boolean, optional): Save terraform output to terraform-output.json file (output command only). Default: false
#   - ServiceConnection (string, optional): Azure service connection for backend state storage. When provided, uses AzureCLI@2 with authentication. Default: ''
#
# Example Usage:
#   # Init command with backend configuration
#   - template: tasks/terraform.yml
#     parameters:
#       Command: 'init'
#       CommandOptions: '-backend-config="key=terraform.tfstate"'
#
#   # Plan command
#   - template: tasks/terraform.yml
#     parameters:
#       Command: 'plan'
#       CommandOptions: '-out=tfplan -input=false'
#
#   # Apply command
#   - template: tasks/terraform.yml
#     parameters:
#       Command: 'apply'
#       CommandOptions: 'tfplan'
#
#   # Output command with file export
#   - template: tasks/terraform.yml
#     parameters:
#       Command: 'output'
#       CommandOptions: '-json'
#       SaveOutputsToFile: true
#
#   # Custom command with service connection
#   - template: tasks/terraform.yml
#     parameters:
#       Command: 'custom'
#       CustomCommand: 'version'
#       ServiceConnection: 'MyAzureConnection'
#
# Notes:
#   - Execution path depends on ServiceConnection: without it, uses native script task; with it, uses AzureCLI@2 for authenticated access.
#   - When ServiceConnection is provided, init command automatically adds -backend-config="use_azuread_auth=true".
#   - Backend and provider configuration should be managed via CommandOptions or Terraform configuration files.
#   - Ensure Terraform CLI is installed and in PATH before executing this template.
#   - See: https://www.terraform.io/cli
#   - See: https://learn.microsoft.com/en-us/azure/devops/pipelines/tasks/reference/azure-cli-v2

parameters:
  # Standard Azure DevOps Task Parameters
  - name: TaskEnvironmentVariables
    type: object
    default: { }
    displayName: 'Key/value pairs of environment variables to be passed to the task'

  - name: TaskNameUniqueSlug
    type: string
    default: ''
    displayName: 'Unique string to add to the task name to make it unique if the same command is repeated'

  - name: Condition
    type: string
    default: succeeded()
    displayName: 'Evaluate this condition expression to determine whether to run this task'

  - name: WorkingDirectory
    type: string
    default: '$(Pipeline.Workspace)'
    displayName: 'Directory containing Terraform configuration files'

  - name: RetryCountOnTaskFailure
    type: number
    default: 0
    displayName: 'Number of times to retry the task on failure'

  - name: Command
    type: string
    # NO default - Consumer must provide this
    values:
      - init
      - validate
      - plan
      - apply
      - output
      - custom
    displayName: 'Terraform command (required)'

  - name: CommandOptions
    type: string
    default: ''
    displayName: 'Extra arguments for the Terraform command'

  - name: CustomCommand
    type: string
    default: ''
    displayName: 'Custom Terraform CLI command (when Command is custom)'

  - name: SaveCommandConsoleOutputToFile
    type: boolean
    default: false
    displayName: 'Save terraform console output to a file'
    # Notes: '>' has to be last in the command to pipe the output to a file
    
  - name: CommandConsoleOutputFileName
    type: string
    default: ''
    displayName: 'Name of file for terraform console output to be saved to'

  - name: ServiceConnection
    type: string
    default: ''
    displayName: 'Service connection for backend state storage'

steps:
  - ${{ if and(eq(parameters.Command, 'custom'), eq(parameters.CustomCommand, '')) }}:
      - "The 'CustomCommand' parameter is required when 'Command' is 'custom'.": "Error"
        
  - ${{ if and(parameters.SaveCommandConsoleOutputToFile, eq(parameters.CommandConsoleOutputFileName, '')) }}:
      - "The 'CommandConsoleOutputFileName' parameter is required when 'SaveCommandConsoleOutputToFile' is true.": "Error"
        
  - ${{ if and(not(parameters.SaveCommandConsoleOutputToFile), ne(parameters.CommandConsoleOutputFileName, '')) }}:
      - "The 'SaveCommandConsoleOutputToFile' parameter is required when 'CommandConsoleOutputFileName' is not empty.": "Error"
        
  - ${{ if eq(parameters.ServiceConnection, '') }}:
      - script: terraform ${{ iif(ne(parameters.Command, 'custom'), parameters.Command, parameters.CustomCommand) }} ${{ parameters.CommandOptions }} ${{ iif(parameters.SaveCommandConsoleOutputToFile, format('> {0}', parameters.CommandConsoleOutputFileName), '') }}
        displayName: "Terraform ${{ iif(ne(parameters.Command, 'custom'), parameters.Command, parameters.CustomCommand) }}"
        name: TerraformTask_${{ iif(ne(parameters.Command, 'custom'), parameters.Command, parameters.CustomCommand) }}${{ iif(parameters.TaskNameUniqueSlug, format('_{0}', parameters.TaskNameUniqueSlug), '') }}
        ${{ if ne(parameters.WorkingDirectory, '') }}:
          workingDirectory: ${{ parameters.WorkingDirectory }}
        ${{ if gt(length(parameters.TaskEnvironmentVariables), 0) }}:
          env: ${{ parameters.TaskEnvironmentVariables }}
        ${{ if ne(parameters.Condition, '') }}:
          condition: ${{ parameters.Condition }}
        ${{ if gt(parameters.RetryCountOnTaskFailure, 0) }}:
          retryCountOnTaskFailure: ${{ parameters.RetryCountOnTaskFailure }}
          
  - ${{ else }}:
      - task: AzureCLI@2
        inputs:
          azureSubscription: ${{ parameters.ServiceConnection }}
          scriptType: pscore
          scriptLocation: inlineScript
          inlineScript: terraform ${{ iif(ne(parameters.Command, 'custom'), parameters.Command, parameters.CustomCommand) }} ${{ parameters.CommandOptions }} ${{ iif(and(eq(parameters.Command, 'init'), not(contains(parameters.CommandOptions, '-backend=false'))), '-backend-config="use_azuread_auth=true"', '') }} ${{ iif(parameters.SaveCommandConsoleOutputToFile, format('> {0}', parameters.CommandConsoleOutputFileName), '') }} # TODO: Refactor use_azuread_auth handling to terraform_deploy.yml for better separation of concerns
          ${{ if ne(parameters.WorkingDirectory, '') }}:
            workingDirectory: ${{ parameters.WorkingDirectory }}
        displayName: "Terraform ${{ iif(ne(parameters.Command, 'custom'), parameters.Command, parameters.CustomCommand) }}"
        name: TerraformTask_${{ iif(ne(parameters.Command, 'custom'), parameters.Command, parameters.CustomCommand) }}${{ iif(parameters.TaskNameUniqueSlug, format('_{0}', parameters.TaskNameUniqueSlug), '') }}
        ${{ if gt(length(parameters.TaskEnvironmentVariables), 0) }}:
          env: ${{ parameters.TaskEnvironmentVariables }}
        ${{ if ne(parameters.Condition, '') }}:
          condition: ${{ parameters.Condition }}
        ${{ if gt(parameters.RetryCountOnTaskFailure, 0) }}:
          retryCountOnTaskFailure: ${{ parameters.RetryCountOnTaskFailure }}
