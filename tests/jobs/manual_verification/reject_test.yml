resources:
  repositories:
    - repository: AzDOPipelineTemplates
      type: github
      endpoint: UKHO
      name: UKHO/devops-azdo-yaml-pipeline-templates
      ref: ${{ variables['Build.SourceBranch'] }} # Build.SourceBranch doesn't work when you click 'Validate' must click the 'Download full YAML' button as it triggers a build

pool:
  name: 'Mare Nectaris'

trigger: none

pr:
  - main

jobs:
  - template: jobs/manual_verification.yml@AzDOPipelineTemplates
    parameters:
      JobName: ManualVerification_Reject
      TimeoutInMinutes: 1
      OnTimeoutBehaviour: reject
      Instructions: 'Please verify the deployment was successful. Check application health and running services.'
      ContinueOnError: true

  # Demonstrates handling of rejection from the verification job
  - job: HandleRejection
    displayName: 'Handle Rejection (if occurred)'
    dependsOn: ManualVerification_Reject
    condition: failed()
    steps:
      - script: echo Manual verification was rejected or timed out - taking corrective action
        displayName: 'Log rejection handling'
