resources:
  repositories:
    - repository: AzDOPipelineTemplates
      type: github
      endpoint: UKHO
      name: UKHO/devops-azdo-yaml-pipeline-templates
      ref: ${{ variables['Build.SourceBranch'] }} # Build.SourceBranch doesn't work when you click 'Validate' must click the 'Download full YAML' button as it triggers a build

pool:
  name: 'Mare Nectaris'

trigger: none

variables:
  - name: artifact_name_one
    value: terraform_build_one
  - name: artifact_name_two
    value: terraform_build_two
  - name: terraform_path
    value: tests/shared_resources/basic_terraform

pr:
  - main

jobs:
  - template: jobs/terraform_build.yml@AzDOPipelineTemplates
    parameters:
      RelativePathToTerraformFiles: $(terraform_path)
      ArtifactName: ${{ variables.artifact_name_one }}
      

  - template: jobs/terraform_gated_deployment.yml@AzDOPipelineTemplates
    parameters:
      DependsOn: TerraformBuild_${{ variables.artifact_name_one }}
      Condition: succeeded('TerraformBuild_${{ variables.artifact_name_one }}')
      TerraformArtifactName: ${{ variables.artifact_name_one }}
      EnvironmentName: Discovery
      TerraformDeploymentConfig:
        AzureServiceConnection: DevOps Chapter Dev
        AzDOEnvironmentName: Discovery
        BackendConfig:
          resource_group_name: $(TFStateResourceGroupName)
          storage_account_name: $(TFStateStorageAccountName)
          container_name: tfstate-devops-azdo-yaml-pipeline-templates
          key: template_test.$(Build.DefinitionName).tfstate
        RunMode: 'PlanVerifyApply'
        VerificationMode: 'VerifyOnDestroy'
        JobsVariableMappings:
          - group: DevOpsChapterAzureSubscription
        EnvironmentVariableMappings:
          TF_VAR_MinRandom: 1000
          TF_VAR_MaxRandom: 100000
        OutputVariables:
          - random_number
          - random_string
        VariableFiles:
          - config/common.tfvars
          - config/discovery.tfvars

  - template: jobs/terraform_build.yml@AzDOPipelineTemplates
    parameters:
      RelativePathToTerraformFiles: $(terraform_path)
      ArtifactName: ${{ variables.artifact_name_two }}
      
  - template: jobs/terraform_gated_deployment.yml@AzDOPipelineTemplates
    parameters:
      DependsOn: TerraformBuild_${{ variables.artifact_name_two }}
      Condition: succeeded('TerraformBuild_${{ variables.artifact_name_two }}')
      TerraformArtifactName: ${{ variables.artifact_name_two }}
      EnvironmentName: Discovery
      TerraformDeploymentConfig:
        AzureServiceConnection: DevOps Chapter Dev
        AzDOEnvironmentName: Discovery
        BackendConfig:
          resource_group_name: $(TFStateResourceGroupName)
          storage_account_name: $(TFStateStorageAccountName)
          container_name: tfstate-devops-azdo-yaml-pipeline-templates
          key: template_test.$(Build.DefinitionName).tfstate
        RunMode: 'PlanVerifyApply'
        VerificationMode: 'VerifyOnDestroy'
        JobsVariableMappings:
          - group: DevOpsChapterAzureSubscription
        EnvironmentVariableMappings:
          TF_VAR_MinRandom: 1000
          TF_VAR_MaxRandom: 100000
        OutputVariables:
          - random_number
          - random_string
        VariableFiles:
          - config/common.tfvars
          - config/discovery.tfvars
