resources:
  repositories:
    - repository: AzDOPipelineTemplates
      type: github
      endpoint: UKHO
      name: UKHO/devops-azdo-yaml-pipeline-templates
      ref: ${{ variables['Build.SourceBranch'] }} # Build.SourceBranch doesn't work when you click 'Validate' must click the 'Download full YAML' button as it triggers a build

pool:
  name: 'Mare Nectaris'

trigger: none

variables:
  - name: artifact_name
    value: terraform_build

pr:
  - main

jobs:
  - template: jobs/terraform_build.yml@AzDOPipelineTemplates
    parameters:
      RelativePathToTerraformFiles: tests/jobs/terraform_build/basic_terraform
      ArtifactName: ${{ variables.artifact_name }}

  - template: jobs/terraform_gated_deployment.yml@AzDOPipelineTemplates
    parameters:
      TerraformArtifactName: ${{ variables.artifact_name }}
      EnvironmentName: Discovery
      TerraformDeploymentConfig:
        AzureServiceConnection: DevOps Chapter Dev
        AzDOEnvironmentName: Discovery
        BackendConfig:
          resource_group_name: $(TFStateResourceGroupName)
          storage_account_name: $(TFStateStorageAccountName)
          container_name: tfstate-devops-azdo-yaml-pipeline-templates
          key: template_test.$(Build.DefinitionName).tfstate
        RunMode: 'PlanOnly'
        JobsVariableMappings:
          - group: DevOpsChapterAzureSubscription
        EnvironmentVariableMappings:
          TF_VAR_MinRandom: 1000
          TF_VAR_MaxRandom: 100000
        OutputVariables:
          - random_number
          - random_string
        VariableFiles:
          - config/common.tfvars
          - config/discovery.tfvars
