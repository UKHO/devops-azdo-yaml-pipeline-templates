resources:
  repositories:
    - repository: AzDOPipelineTemplates
      type: github
      endpoint: UKHO
      name: UKHO/devops-azdo-yaml-pipeline-templates
      ref: ${{ variables['Build.SourceBranch'] }} # Build.SourceBranch doesn't work when you click 'Validate' must click the 'Download full YAML' button as it triggers a build

pool:
  name: 'Mare Nectaris'

trigger: none

variables:
  - name: artifact_name
    value: terraform_build
  - name: terraform_path
    value: tests/shared_resources/basic_terraform

pr:
  - main

jobs:
  - template: jobs/terraform_build.yml@AzDOPipelineTemplates
    parameters:
      TerraformVersion: 1.13.0
      RelativePathToTerraformFiles: $(terraform_path)
      ArtifactName: ${{ variables.artifact_name }}

  - job: ValidateResults
    dependsOn:
      - TerraformBuild_${{ variables.artifact_name }}
    steps:
      - template: tasks/download_pipeline_artifact.yml@AzDOPipelineTemplates
        parameters:
          ArtifactName: ${{ variables.artifact_name }}
