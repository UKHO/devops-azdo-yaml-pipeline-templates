resources:
  repositories:
    - repository: AzDOPipelineTemplates
      type: github
      endpoint: UKHO
      name: UKHO/devops-azdo-yaml-pipeline-templates
      ref: ${{ variables['Build.SourceBranch'] }} # Build.SourceBranch doesn't work when you click 'Validate' must click the 'Download full YAML' button as it triggers a build

pool:
  name: 'Mare Nectaris'

trigger: none

variables:
  - name: artifact_name_one
    value: terraform_build_one
  - name: artifact_name_two
    value: terraform_build_two

pr:
  - main

jobs:
  - template: jobs/terraform_build.yml@AzDOPipelineTemplates
    parameters:
      RelativePathToTerraformFiles: tests/jobs/terraform_build/basic_terraform
      ArtifactName: ${{ variables.artifact_name_one }}

  - template: jobs/terraform_build.yml@AzDOPipelineTemplates
    parameters:
      RelativePathToTerraformFiles: tests/jobs/terraform_build/basic_terraform
      ArtifactName: ${{ variables.artifact_name_two }}

  - job: ValidateResults
    dependsOn:
      - TerraformBuild_${{ variables.artifact_name_one }}
      - TerraformBuild_${{ variables.artifact_name_two }}
    steps:
      - template: tasks/download_pipeline_artifact.yml@AzDOPipelineTemplates
        parameters:
          ArtifactName: ${{ variables.artifact_name_one }}
      - template: tasks/download_pipeline_artifact.yml@AzDOPipelineTemplates
        parameters:
          ArtifactName: ${{ variables.artifact_name_two }}
