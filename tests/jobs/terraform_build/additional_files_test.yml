resources:
  repositories:
    - repository: AzDOPipelineTemplates
      type: github
      endpoint: UKHO
      name: UKHO/devops-azdo-yaml-pipeline-templates
      ref: ${{ variables['Build.SourceBranch'] }}

pool:
  name: 'Mare Nectaris'

trigger: none

variables:
  - name: artifact_name
    value: terraform_build_with_files
  - name: terraform_path
    value: tests/shared_resources/basic_terraform

pr:
  - main

jobs:
  - template: jobs/terraform_build.yml@AzDOPipelineTemplates
    parameters:
      RelativePathToTerraformFiles: $(terraform_path)
      ArtifactName: ${{ variables.artifact_name }}
      AdditionalFilesToPackage:
        - SourceDirectory: tests/shared_resources/additional_files/policies
          FilesPattern: '**/*.json'
          TargetSubdirectoryName: policies
        - SourceDirectory: tests/shared_resources/additional_files/configs
          FilesPattern: '**/*.env'
          TargetSubdirectoryName: configs

  - job: ValidateResults
    dependsOn:
      - TerraformBuild_${{ variables.artifact_name }}
    steps:
      - template: tasks/download_pipeline_artifact.yml@AzDOPipelineTemplates
        parameters:
          ArtifactName: ${{ variables.artifact_name }}

