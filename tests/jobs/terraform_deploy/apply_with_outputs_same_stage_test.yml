resources:
  repositories:
    - repository: AzDOPipelineTemplates
      type: github
      endpoint: UKHO
      name: UKHO/devops-azdo-yaml-pipeline-templates
      ref: ${{ variables['Build.SourceBranch'] }}

pool:
  name: 'Mare Nectaris'

trigger: none

variables:
  - name: terraform_path
    value: tests/shared_resources/basic_terraform

pr:
  - main

jobs:
  - template: jobs/terraform_build.yml@AzDOPipelineTemplates
    parameters:
      RelativePathToTerraformFiles: $(terraform_path)

  - template: jobs/terraform_deploy.yml@AzDOPipelineTemplates
    parameters:
      TerraformDeployMode: Apply
      DependsOn: TerraformBuild_TerraformArtifact
      Condition: succeeded('TerraformBuild_TerraformArtifact')
      EnvironmentName: Discovery
      TerraformDeploymentConfig:
        AzureServiceConnection: DevOps Chapter Dev
        AzDOEnvironmentName: Discovery
        BackendConfig:
          resource_group_name: $(TFStateResourceGroupName)
          storage_account_name: $(TFStateStorageAccountName)
          container_name: tfstate-devops-azdo-yaml-pipeline-templates
          key: template_test.$(Build.DefinitionName).tfstate
        RunMode: 'ApplyOnly'
        OutputVariables:
          - random_number
          - random_string
        JobsVariableMappings:
          - group: DevOpsChapterAzureSubscription
        EnvironmentVariableMappings:
          TF_VAR_MinRandom: 1000
          TF_VAR_MaxRandom: 100000
        VariableFiles:
          - config/common.tfvars

  - job: ValidateOutputVariables
    displayName: 'Validate Output Variables'
    dependsOn: TerraformDeployApply_TerraformArtifact
    condition: succeeded('TerraformDeployApply_TerraformArtifact')
    variables:
      RandomNumber: $[dependencies.TerraformDeployApply_TerraformArtifact.outputs['TerraformDeployApply_TerraformArtifact.TerraformExportOutputsVariables.random_number']]
      RandomString: $[dependencies.TerraformDeployApply_TerraformArtifact.outputs['TerraformDeployApply_TerraformArtifact.TerraformExportOutputsVariables.random_string']]
    steps:
      - pwsh: |
          Write-Host "Validating output variables..."
          Write-Host "RandomNumber: $(RandomNumber)"
          Write-Host "RandomString: $(RandomString)"
          
          if ([string]::IsNullOrWhiteSpace("$(RandomNumber)")) {
            Write-Host "##[error]Output variable 'random_number' is empty"
            exit 1
          }
          
          if ([string]::IsNullOrWhiteSpace("$(RandomString)")) {
            Write-Host "##[error]Output variable 'random_string' is empty"
            exit 1
          }
          
          Write-Host "##[section]All output variables are populated successfully"
        displayName: 'Check Output Variables Are Not Empty'

