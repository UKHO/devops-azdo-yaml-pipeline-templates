resources:
  repositories:
    - repository: AzDOPipelineTemplates
      type: github
      endpoint: UKHO
      name: UKHO/devops-azdo-yaml-pipeline-templates
      ref: ${{ variables['Build.SourceBranch'] }} # Build.SourceBranch doesn't work when you click 'Validate' must click the 'Download full YAML' button as it triggers a build

pool:
  name: Azure-UKHO-Engineering
  demands: ImageOverride -equals ubuntu-latest

extends:
  template: pipelines/infrastructure_pipeline.yml@AzDOPipelineTemplates
  parameters:
    RelativePathToTerraformFiles: tests/pipelines/infrastructure_pipeline/elastic_terraform
    TerraformVersion: latest
    # TerraformBuildInjectionSteps # do not need to test
    EnvironmentConfigs:
      - Name: dev
        Stage:
          DependsOn:
            - build
          Condition: succeeded('build')
        InfrastructureConfig:
          AzureServiceConnection: DevOps Chapter Dev
          AzDOEnvironmentName: Elastic
          BackendConfig:
            - "resource_group_name=$(TFStateResourceGroupName)"
            - "storage_account_name=$(TFStateStorageAccountName)"
            - "container_name=tfstate-devops-azdo-yaml-pipeline-templates"
            - "key=pipeline.elastic_test.tfstate"
          RunMode: 'PlanOnly'
          VerificationMode: 'VerifyOnAny'
          EnvironmentVariableMappings:
            ELASTICSEARCH_API_KEY: $(Elastic-ApiKey)
            ELASTICSEARCH_ENDPOINTS: $(Elastic-Endpoints)
            KIBANA_ENDPOINTS: $(Kibana-Endpoints)
          JobsVariableMappings:
            - group: NonLive-Elastic
            - group: DevOpsChapterAzureSubscription
