trigger: none
pr: none

pool:
  name: 'Mare Nubium'   # use your Windows pool

variables:
  buildConfiguration: 'Release'

steps:
  - checkout: self
    fetchDepth: 0

  - task: UseDotNet@2
    displayName: 'Use .NET'
    inputs:
      packageType: sdk
      version: '8.0.x'
      installationPath: $(Agent.ToolsDirectory)/dotnet

  - task: NuGetAuthenticate@1
    displayName: 'Authenticate to NuGet feeds'

  - task: DotNetCoreCLI@2
    displayName: 'Restore'
    inputs:
      command: restore
      projects: 'tests/pipelines/dotnet_build_pipeline/test_app/ExampleWebApp.sln'
      feedsToUse: select

  - task: DotNetCoreCLI@2
    displayName: 'Build'
    inputs:
      command: build
      projects: 'tests/pipelines/dotnet_build_pipeline/test_app/ExampleWebApp.sln'
      arguments: '--configuration $(buildConfiguration) --no-restore'

  - task: DotNetCoreCLI@2
    displayName: 'Test'
    inputs:
      command: test
      projects: 'tests/pipelines/dotnet_build_pipeline/test_app/ExampleWebApp.sln'
      arguments: '--configuration $(buildConfiguration) --no-build --logger trx'
      publishTestResults: false

  - task: PublishTestResults@2
    displayName: 'Publish test results'
    condition: succeededOrFailed()
    inputs:
      testResultsFormat: 'VSTest'
      testResultsFiles: '**/*.trx'
      failTaskOnFailedTests: true

  - task: DotNetCoreCLI@2
    displayName: 'Publish'
    inputs:
      command: publish
      publishWebProjects: false
      projects: 'tests/pipelines/dotnet_build_pipeline/test_app/ExampleWebApp/ExampleWebApp.csproj'
      arguments: '--configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/app --no-build'
      zipAfterPublish: true

  - task: PublishPipelineArtifact@1
    displayName: 'Publish artifact'
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)/app'
      artifact: 'ExampleWebApp'
      publishLocation: 'pipeline'
