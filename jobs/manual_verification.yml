parameters:
  - name: JobName
    type: string
    default: ManualVerification
    displayName: 'Name of the job'

  - name: Condition
    type: string
    default: succeeded()
    displayName: 'Condition to run the job'

  - name: DependsOn
    type: object
    default: [ ]
    displayName: 'List of jobs this job depends on'

  - name: OnTimeoutBehaviour
    type: string
    default: 'reject'
    values: [ reject, resume ]
    displayName: 'Action to take when validation times out (reject or resume)'

  - name: OnTimeoutBehaviour
    type: string
    default: 'reject'
    values: [ reject, resume ]
    displayName: 'Action to take when validation times out (reject or resume)'

  - name: TimeoutInMinutes
    type: number
    default: 60
    displayName: 'Timeout for manual verification (minutes)'

  - name: Instructions
    type: string
    default: ''
    displayName: 'Instructions shown to users for manual validation decision'

jobs:
  - job: ${{ parameters.JobName }}
    condition: ${{ parameters.Condition }}
    dependsOn: ${{ parameters.DependsOn }}
    pool: server
    displayName: 'Manual Verification'
    steps:
      - template: /tasks/delay.yml

      - template: /tasks/manual_validation.yml
        parameters:
          OnTimeoutBehaviour: ${{ parameters.OnTimeoutBehaviour }}
          TimeoutInMinutes: ${{ parameters.TimeoutInMinutes }}
          Instructions: ${{ parameters.Instructions }}
