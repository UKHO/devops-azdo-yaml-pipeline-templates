parameters:
  - name: AdditionalFilesToPackage
    type: object
    default: {}

  - name: TerraformBuildInjectionSteps
    type: stepList
    default: [ ]
    displayName: 'Steps to be carried out before the terraform is init, validated, and packaged'

steps:
  - checkout: self
    displayName: 'Clean the directory post validation'
    clean: true
    path: $(RepositoryCheckoutFolderName)

  # Repeat TerraformBuildInjectionSteps on clean code
  - ${{ each step in parameters.TerraformBuildInjectionSteps }}:
      - ${{ step }}

  - ${{ each additionalFileToPackage in parameters.AdditionalFilesToPackage }}:
      - template: ../tasks/copy_files.yml
        parameters:
          SourceFolder: $(RepositoryDirectory)/${{ additionalFileToPackage.SourceDirectory }}
          FilesPattern: ${{ additionalFileToPackage.FilesPattern }}
          TargetFolder: $(TerraformWorkingDirectory)/${{ additionalFileToPackage.TargetSubdirectoryName }}
