# Azure DevOps Task List: Key Vault Configs Task List
#
# Purpose:
#   Generates multiple reusable Key Vault task invocations from a KeyVaultConfigs array,
#   enabling management of multiple Key Vaults in a single deployment.
#
# Parameters:
#   - KeyVaultConfigs (object array, required): Array of Key Vault configuration objects.
#     Each object must contain: Name (string, required), ServiceConnection (string, required),
#     SecretsFilter (string, optional, default: '*'), RunAsPreJob (boolean, optional, default: false)
#
# Example Usage:
#   - template: utils/key_vault_configs_task_list.yml
#     parameters:
#       KeyVaultConfigs:
#         - Name: 'prod-vault-1'
#           ServiceConnection: 'Azure-Prod-SC'
#           SecretsFilter: 'app-*'
#           RunAsPreJob: false
#         - Name: 'prod-vault-2'
#           ServiceConnection: 'Azure-Prod-SC'
#           SecretsFilter: 'db-*'
#           RunAsPreJob: false
#
# Notes:
#   - Entries execute in the order listed in the array.
#   - Secrets from each Key Vault are mapped to pipeline variables with matching names.
#   - See: https://learn.microsoft.com/en-us/azure/devops/pipelines/tasks/reference/azure-key-vault-v2

parameters:
  - name: KeyVaultConfigs
    type: object
    # NO default - Consumer must provide this
    displayName: 'Array of Key Vault configuration objects (required)'

steps:
  - template: /schemas/key_vault_configs.yml
    parameters:
      KeyVaultConfigs: ${{ parameters.KeyVaultConfigs }}

  - ${{ each kvConfig in parameters.KeyVaultConfigs }}:
    - template: /tasks/azure_key_vault.yml
      parameters:
        KeyVaultServiceConnection: ${{ kvConfig.ServiceConnection }}
        KeyVaultName: ${{ kvConfig.Name }}
        SecretsFilter: ${{ coalesce(kvConfig.SecretsFilter, '*') }}
        RunAsPreJob: ${{ coalesce(kvConfig.RunAsPreJob, false) }}

