# Schema Template: Config Sources
# Validates `ConfigSources` entries for templates that support ordered configuration loading from Key Vault.
# See: docs/definition_docs/shared/config_sources.md

parameters:
  - name: ConfigSources
    type: object
    # NO default - Consumer must provide this
    displayName: 'List of configuration-source objects (required)'

steps:
  - ${{ if eq(length(parameters.ConfigSources), 0) }}:
      - "Invalid ConfigSources: list cannot be empty. If no configuration sources are needed, omit the parameter entirely.": "Error"
  - ${{ else }}:
      - ${{ each source in parameters.ConfigSources }}:
          # Required/type/value checks for entry discriminator.
          - ${{ if or(or(not(source.Type), eq(source.Type, '')), or(contains(convertToJson(source.Type), '{'), contains(convertToJson(source.Type), '[')), notIn(source.Type, 'KeyVault')) }}:
              - "Invalid ConfigSources: entry field 'Type' is required, must be a non-empty string, and must be 'KeyVault'. See docs/definition_docs/shared/config_sources.md": "Error"

          # Required field checks shared by all source types.
          - ${{ if or(not(source.ServiceConnection), eq(source.ServiceConnection, '')) }}:
              - "Invalid ConfigSources: entry is missing required field 'ServiceConnection'. See docs/definition_docs/shared/config_sources.md": "Error"

          # Type checks shared by all source types.
          - ${{ if or(contains(convertToJson(source.ServiceConnection), '{'), contains(convertToJson(source.ServiceConnection), '[')) }}:
              - "Invalid ConfigSources: entry field 'ServiceConnection' must be a string. See docs/definition_docs/shared/config_sources.md": "Error"

          - ${{ if eq(source.Type, 'KeyVault') }}:
              # KeyVault required field checks.
              - ${{ if or(not(source.Name), eq(source.Name, '')) }}:
                  - "Invalid ConfigSources: KeyVault entry is missing required field 'Name'. See docs/definition_docs/shared/config_sources.md": "Error"

              # KeyVault type checks.
              - ${{ if or(contains(convertToJson(source.Name), '{'), contains(convertToJson(source.Name), '[')) }}:
                  - "Invalid ConfigSources: KeyVault entry field 'Name' must be a string. See docs/definition_docs/shared/config_sources.md": "Error"

              # KeyVault optional field checks (when provided).
              - ${{ if and(contains(convertToJson(source), '"SecretsFilter"'), eq(source.SecretsFilter, '')) }}:
                  - "Invalid ConfigSources: KeyVault entry field 'SecretsFilter' must be a non-empty string when provided. See docs/definition_docs/shared/config_sources.md": "Error"

              - ${{ if and(contains(convertToJson(source), '"SecretsFilter"'), or(contains(convertToJson(source.SecretsFilter), '{'), contains(convertToJson(source.SecretsFilter), '['))) }}:
                  - "Invalid ConfigSources: KeyVault entry field 'SecretsFilter' must be a non-empty string when provided. See docs/definition_docs/shared/config_sources.md": "Error"

              - ${{ if and(contains(convertToJson(source), '"RunAsPreJob"'), notIn(source.RunAsPreJob, true, false)) }}:
                  - "Invalid ConfigSources: KeyVault entry field 'RunAsPreJob' must be a boolean when provided. See docs/definition_docs/shared/config_sources.md": "Error"


