# Schema Template: Terraform Deployment Config
# Validates terraform deployment configuration objects used by deployment jobs.
# See: docs/definition_docs/terraform_pipeline/terraform_deployment_config.md

parameters:
  - name: TerraformDeploymentConfig
    type: object
    # NO default - Consumer must provide this
    displayName: 'Terraform deployment configuration object (see docs/definition_docs/terraform_pipeline/terraform_deployment_config.md)'

  - name: EnvironmentName
    type: string
    # NO default - Consumer must provide this
    displayName: 'The environment name that the infrastructure is for'

jobs:
  - ${{ if or(not(parameters.TerraformDeploymentConfig.AzDOEnvironmentName), eq(parameters.TerraformDeploymentConfig.AzDOEnvironmentName, '')) }}:
    - "'${{ parameters.EnvironmentName }}' environment error: AzDOEnvironmentName is not properly defined and is a required field.": "Error"

  - ${{ if notIn(parameters.TerraformDeploymentConfig.RunMode, 'PlanVerifyApply', 'PlanOnly', 'ApplyOnly') }}:
      - "'${{ parameters.EnvironmentName }}' environment error: Must provide a valid RunMode option (PlanVerifyApply, PlanOnly, ApplyOnly).": "Error"

  - ${{ if eq(parameters.TerraformDeploymentConfig.RunMode, 'PlanVerifyApply') }}:
    - ${{ if notIn(parameters.TerraformDeploymentConfig.VerificationMode, 'VerifyOnDestroy', 'VerifyOnAny', 'VerifyDisabled') }}:
      - "'${{ parameters.EnvironmentName }}' environment error: Must provide a valid VerificationMode option (VerifyOnDestroy, VerifyOnAny, VerifyDisabled).": "Error"

  # OPTIONAL PARAMETERS

  - ${{ if contains(convertToJson(parameters.TerraformDeploymentConfig), 'AzureServiceConnection') }}:
    - ${{ if eq(length(parameters.TerraformDeploymentConfig.AzureServiceConnection), 0) }}:
      - "'${{ parameters.EnvironmentName }}' environment error: AzureServiceConnection is not properly defined.": "Error"

  - ${{ if or(parameters.TerraformDeploymentConfig.KeyVaultConfig.ServiceConnection, parameters.TerraformDeploymentConfig.KeyVaultConfig.Name, parameters.TerraformDeploymentConfig.KeyVaultConfig.SecretsFilter) }}:
    # At least one property is set, so all three must be set
    - ${{ if or(not(parameters.TerraformDeploymentConfig.KeyVaultConfig.ServiceConnection), eq(parameters.TerraformDeploymentConfig.KeyVaultConfig.ServiceConnection, '')) }}:
      - "'${{ parameters.EnvironmentName }}' environment error: KeyVaultConfig.ServiceConnection is required when any Key Vault configuration is provided.": "Error"
    - ${{ if or(not(parameters.TerraformDeploymentConfig.KeyVaultConfig.Name), eq(parameters.TerraformDeploymentConfig.KeyVaultConfig.Name, '')) }}:
      - "'${{ parameters.EnvironmentName }}' environment error: KeyVaultConfig.Name is required when any Key Vault configuration is provided.": "Error"
    - ${{ if or(not(parameters.TerraformDeploymentConfig.KeyVaultConfig.SecretsFilter), eq(parameters.TerraformDeploymentConfig.KeyVaultConfig.SecretsFilter, '')) }}:
      - "'${{ parameters.EnvironmentName }}' environment error: KeyVaultConfig.SecretsFilter is required when any Key Vault configuration is provided.": "Error"

  - ${{ if parameters.TerraformDeploymentConfig.BackendConfig }}:
      - ${{ if not(contains(convertToJson(parameters.TerraformDeploymentConfig.BackendConfig), '{')) }}:
          - "'${{ parameters.EnvironmentName }}' environment error: BackendConfig is not correct. Must be an object of key/value pairs.": "Error"
      - ${{ else }}:
          - ${{ each mapping in parameters.TerraformDeploymentConfig.BackendConfig }}:
              - ${{ if or(not(mapping.Key), not(mapping.Value), eq(mapping.Key, ''), eq(mapping.Value, '')) }}:
                  - "'${{ parameters.EnvironmentName }}' environment error: BackendConfig is not correct. Must be an object of key/value pairs.": "Error"

  - ${{ if parameters.TerraformDeploymentConfig.EnvironmentVariableMappings }}:
    - ${{ if not(contains(convertToJson(parameters.TerraformDeploymentConfig.EnvironmentVariableMappings), '{')) }}:
      - "'${{ parameters.EnvironmentName }}' environment error: EnvironmentVariableMappings is not correct. Must be an object of key/value pairs.": "Error"
    - ${{ else }}:
      - ${{ each mapping in parameters.TerraformDeploymentConfig.EnvironmentVariableMappings }}:
        - ${{ if or(not(mapping.Key), not(mapping.Value), eq(mapping.Key, ''), eq(mapping.Value, '')) }}:
          - "'${{ parameters.EnvironmentName }}' environment error: EnvironmentVariableMappings is not correct. Key: '${{ mapping.Key }}'. Value: '${{ mapping.Value }}'. Must be an object of key/value pairs.": "Error"

  - ${{ if parameters.TerraformDeploymentConfig.VariableFiles }}: # Only run validation if the optional parameter is present
    - ${{ if not(contains(convertToJson(parameters.TerraformDeploymentConfig.VariableFiles), '[')) }}: # Make sure it is a list
      - "'${{ parameters.EnvironmentName }}' environment error: VariableFiles is not correct. Must be a list of string values.": "Error"
    - ${{ else }}:
      - ${{ each variable in parameters.TerraformDeploymentConfig.VariableFiles }}: # Make sure each item in the list is just a string
        - ${{ if or(contains(convertToJson(variable), '['), contains(convertToJson(variable), '{')) }}: # if either is present, it is an object not a string
          - "'${{ parameters.EnvironmentName }}' environment error: VariableFiles item '${{ replace(convertToJson(variable), '\n', ' ') }}' is not a string. This parameter must be a list of string values.": "Error"

  - ${{ if parameters.TerraformDeploymentConfig.OutputVariables }}: # Only run validation if the optional parameter is present
    - ${{ if not(contains(convertToJson(parameters.TerraformDeploymentConfig.OutputVariables), '[')) }}: # Make sure it is a list
      - "'${{ parameters.EnvironmentName }}' environment error: OutputVariables is not correct. Must be a list of string values.": "Error"
    - ${{ else }}:
      - ${{ each variable in parameters.TerraformDeploymentConfig.OutputVariables }}: # Make sure each item in the list is just a string
        - ${{ if or(contains(convertToJson(variable), '['), contains(convertToJson(variable), '{')) }}: # if either is present, it is an object not a string
          - "'${{ parameters.EnvironmentName }}' environment error: OutputVariables item '${{ replace(convertToJson(variable), '\n', ' ') }}' is not a string. This parameter must be a list of string values.": "Error"
