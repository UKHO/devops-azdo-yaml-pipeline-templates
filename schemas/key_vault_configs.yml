# Schema Template: Key Vault Configs
# Validates `KeyVaultConfigs` entries for templates that support multi-Key Vault configuration.
# See: docs/definition_docs/shared/key_vault_configs.md

parameters:
  - name: KeyVaultConfigs
    type: object
    # NO default - Consumer must provide this
    displayName: 'Array of Key Vault configuration objects (required)'
steps:
  - ${{ if eq(length(parameters.KeyVaultConfigs), 0) }}:
      - "Invalid KeyVaultConfigs: array cannot be empty. If no Key Vaults are needed, omit the parameter entirely.": "Error"
  - ${{ else }}:
      - ${{ each kvConfig in parameters.KeyVaultConfigs }}:
          - ${{ if or(not(kvConfig.Name), eq(kvConfig.Name, '')) }}:
              - "Invalid KeyVaultConfigs: entry is missing required field 'Name'. See docs/definition_docs/shared/key_vault_configs.md": "Error"
          - ${{ if or(not(kvConfig.ServiceConnection), eq(kvConfig.ServiceConnection, '')) }}:
              - "Invalid KeyVaultConfigs: entry is missing required field 'ServiceConnection'. See docs/definition_docs/shared/key_vault_configs.md": "Error"
